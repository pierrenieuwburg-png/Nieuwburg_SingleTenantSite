<div id="booking-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 650px; position: relative;">
        <button id="close-booking-modal-button" class="modal-close">&times;</button>
        
        <!-- STEP 1: CATEGORY -->
        <div id="booking-step-1" class="wizard-step-container active">
            <h2 class="auth-title">Book a Service</h2>
            <p style="text-align: center; color: #555;">Select a category to get started.</p>
            
            <div class="wizard-category-grid" id="wizard-categories">
                <p style="text-align: center; width: 100%;">Loading services...</p>
            </div>
        </div>

        <!-- STEP 2: LOCATION (MAP FIXED) -->
        <div id="booking-step-2" class="wizard-step-container">
            <h2 class="auth-title">Service Address</h2>
            <p style="text-align: center; color: #555;">Where are we heading?</p>
            
            <div class="form-group" style="margin-top: 20px;">
                <label for="street-address">Street Address</label>
                <!-- ID restored for Google Maps API -->
                <input type="text" id="street-address" class="auth-input" placeholder="Start typing your address..." style="width: 100%; padding: 12px;">
            </div>
            
            <!-- Map Container Restored -->
            <div id="map" style="height: 250px; width: 100%; margin-top: 15px; border-radius: 8px; border: 1px solid #e5e7eb;"></div>
            
            <div class="modal-actions" style="justify-content: space-between; margin-top: 30px;">
                <button class="cta-outline" onclick="goToStep(1)" style="border-color: var(--wizard-purple); color: var(--wizard-purple);">Back</button>
                <button class="cta" onclick="goToStep(3)" style="background: var(--wizard-turquoise); border-color: var(--wizard-turquoise);">Next: Scope & Extras</button>
            </div>
        </div>

        <!-- STEP 3: CART & SCOPE (SWEEPSOUTH STYLE) -->
        <div id="booking-step-3" class="wizard-step-container">
             <h2 class="auth-title">Build Your Service</h2>
             <p style="text-align: center; color: #555;">Tell us about the space and select any extras.</p>
             
             <!-- Primary Scope (Counters) -->
             <div class="wizard-scope-section" id="wizard-scope-items">
                 <!-- Injected via JS -->
             </div>

             <!-- Extras (Icon Grid) -->
             <h3 style="font-size: 1rem; color: #002244; margin-bottom: 5px;">What extras do you need?</h3>
             <div class="wizard-extras-grid" id="wizard-extras-items">
                 <!-- Injected via JS -->
             </div>

             <div class="wizard-live-total">
                 <span>Estimated Total:</span>
                 <span id="wizard-live-price">R 0.00</span>
             </div>

             <div class="modal-actions" style="justify-content: space-between; margin-top: 20px;">
                <button class="cta-outline" onclick="goToStep(2)" style="border-color: var(--wizard-purple); color: var(--wizard-purple);">Back</button>
                <button class="cta" onclick="goToStep(4)" style="background: var(--wizard-orange); border-color: var(--wizard-orange);">Next: Schedule</button>
            </div>
        </div>

        <!-- STEP 4: SCHEDULE & PAY (BUTTON FIXED) -->
        <div id="booking-step-4" class="wizard-step-container">
            <h2 class="auth-title">Schedule & Checkout</h2>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>Date</label>
                    <input type="date" id="wizard-date" class="auth-input" style="width: 100%; padding: 12px;" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Time</label>
                    <input type="time" id="wizard-time" class="auth-input" style="width: 100%; padding: 12px;" required>
                </div>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Full Name</label>
                    <input type="text" id="wizard-name" class="auth-input" placeholder="Jane Doe" style="width: 100%; padding: 12px;" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Email Address</label>
                    <input type="email" id="wizard-email" class="auth-input" placeholder="you@example.com" style="width: 100%; padding: 12px;" required>
                </div>
            </div>

            <div class="modal-actions" style="justify-content: space-between; margin-top: 30px;">
                <button class="cta-outline" onclick="goToStep(3)" style="border-color: var(--wizard-purple); color: var(--wizard-purple);">Back</button>
                <button class="cta" id="wizard-pay-btn" style="background: var(--wizard-green); border-color: var(--wizard-green); width: 60%;">Pay & Book</button>
            </div>
        </div>
    </div>
</div>
