<div id="quote-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 650px;">
        <button id="close-quote-modal-button" class="modal-close">&times;</button>
        <h2 class="auth-title">Request a Specialized Quote</h2>
        <p style="text-align: center; margin-top: -5px; margin-bottom: 25px; color: #555;">
            For unique, large, or specialized jobs, please provide the details below.
        </p>
        
        <form id="quote-request-form" class="auth-form-modal" style="display: block;">
            
            <div id="quote-alert-placeholder" class="flash" style="display: none; margin-bottom: 15px;"></div>

            <div class="form-group">
                <label for="quote-name">Full Name</label>
                <input type="text" class="auth-input" id="quote-name" name="name" required
                       value="{{ current_user.profile.full_name if current_user.is_authenticated and current_user.profile else '' }}">
            </div>
            <div class="form-group">
                <label for="quote-email">Email Address</label>
                <input type="email" class="auth-input" id="quote-email" name="email" required
                       value="{{ current_user.email if current_user.is_authenticated else '' }}">
            </div>
            <div class="form-group">
                <label for="quote-phone">Phone Number</label>
                <input type="tel" class="auth-input" id="quote-phone" name="phone" required
                       value="{{ current_user.profile.phone_number if current_user.is_authenticated and current_user.profile else '' }}">
            </div>
            <div class="form-group">
                <label for="quote-address">Property Address (Optional)</label>
                <input type="text" class="auth-input" id="quote-address" name="address"
                       value="{{ current_user.profile.address if current_user.is_authenticated and current_user.profile else '' }}">
            </div>
            <div class="form-group">
                <label for="quote-description">Quote Details</label>
                <textarea class="auth-input" id="quote-description" name="description" rows="4"
                          placeholder="e.g., 'Post-construction clean for multiple units'..." required></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="cta w-100" id="quote-submit-btn">
                    Submit Quote Request
                </button>
            </div>
        </form>
    </div>
</div>
